services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tada}
      POSTGRES_USER: ${POSTGRES_USER:-tadauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tadapw}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  web:
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "${TADA_WEB_BIND:-127.0.0.1}:${TADA_WEB_PORT:-8017}:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-tadauser}:${POSTGRES_PASSWORD:-tadapw}@db:5432/${POSTGRES_DB:-tada}
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
