services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./testing:/tmp/testing
    environment:
      POSTGRES_DB: tada
      POSTGRES_USER: tadauser
      POSTGRES_PASSWORD: tadapw
    ports:
      - "5432:5432"
    networks:
      - default

  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: user@example.com
  #     PGADMIN_DEFAULT_PASSWORD: tadapw
  #   ports:
  #     - "8080:80" # Access pgAdmin on http://localhost:8080
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   networks:
  #     - default
  #   depends_on:
  #     - db

  web:
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             python manage.py populate_sample_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    networks:
      - default

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    driver: bridge
