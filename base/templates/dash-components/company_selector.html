{# Company selector — only shown when the user has access to multiple companies #}
{% if all_companies|length > 1 %}
<div class="company-selector">
    <form method="get" action="{% url 'dashboard' %}">
        <label for="company_id">Company:</label>
        <select name="company_id" id="company_id" onchange="this.form.submit()">
            {% for company in all_companies %}
            <option value="{{ company.id }}" {% if company.id == selected_company.id %}selected{% endif %}>
                {{ company.title }}
            </option>
            {% endfor %}
        </select>
    </form>
</div>
{% endif %}
