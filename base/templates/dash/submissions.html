{# Submissions — all staff can view and set status #}
<div class="card">
    <div class="card-header">
        <span class="row-1">Submissions</span>
    </div>
    <div class="list-group">
        {% for submission in submissions %}
        <div class="list-group-item">
            <h3>{{ submission.candidate }} — {{ submission.position }}</h3>
            <p>Status: {{ submission.status }}</p>
            <div><a href="{% url 'submission_detail' submission.id %}">View</a></div>
        </div>
        {% empty %}
        <div class="list-group-item">No submissions available.</div>
        {% endfor %}
    </div>
</div>
