<!-- This page is basically an HTML template that other pages extend -->
<!-- "title" and "content" are blocks that other pages can override -->
{% load static %}

<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{% endblock %}</title>
        <!-- <script src="https://cdn.tailwindcss.com"></script> -->
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
        <style>{% block style %}{% endblock %}</style>
    </head>
    <body>
        {% include 'navbar.html' %}
        {% block content %}
        {% endblock %}
    </body>
</html>
