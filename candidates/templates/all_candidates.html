{% extends 'master.html' %}

{% block title %}
  TADA - All candidates
{% endblock %}

{% block content %}
  <style>
    nav {
      border-bottom: 1px solid #ccc;
      padding-bottom: 10px;
    }
    
    nav ul {
      display: flex;
      justify-content: center;
    }
    
    nav ul li {
      margin: 0 10px;
      list-style-type: none;
    }
    
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
  </style>

  <nav>
    <ul>
      <li>
        <li><a href='/'>Home</a></li>
        <li><a href='/about/'>About</a></li>
        <li><a href='/signup/'>Sign Up</a></li>
      </li>
    </ul>
  </nav>

  <h1>Candidates</h1>

  <ul>
    {% for x in mycandidates %}
      <li>
        <a href="details/{{ x.id }}/">{{ x.user.get_full_name }}</a>
      </li>
    {% endfor %}
  </ul>

  <!-- <p><a href="/">Back to Home</a></p> -->
{% endblock %}
